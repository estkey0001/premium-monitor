name: Daily LP Update

on:
  schedule:
    # 日本時間 12:00 JST (UTC: 03:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

# 同一ワークフローの同時実行を防ぐ（後続Runを待機させ、push競合を回避）
concurrency:
  group: daily-lp-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-lp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # 1. Init DB
      - name: Init DB
        run: python -m src.cli init-db

      # 2. Seed DB
      - name: Seed products
        run: python -m src.cli seed

      # 3. Update buyback prices (Playwright scraping)
      - name: Update buyback prices auto scraping
        run: python scripts/update_buyback_prices.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      - name: Update camera buyback (new/unused)
        run: python scripts/update_camera_buyback.py --priority-only --playwright --debug-html --verbose
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 3.5 公式定価の自動収集（apple/ricoh/fujifilm/canon/nikon/sony）
      # source config(target_url) 未設定の商品は安全にスキップ。IPブロック時も継続。
      - name: Collect official prices
        run: python -m src.cli collect-official
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 4. Collector quality gate
      - name: Collector quality gate
        id: quality_gate
        continue-on-error: true   # 誤価格検出時もLPは更新する（サマリーで通知）
        run: |
          python scripts/check_collector_quality.py
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" -eq 1 ]; then
            # suspicious_price / low_confidence のみ FAILURE
            echo "::error::品質ゲート FAILURE — suspicious_price または low_confidence を検出（誤価格リスク — LP公開前に要確認）"
            exit 1
          fi
          # WARNING は check_collector_quality.py が ::warning:: を直接出力するため、ここでは何もしない
        env:
          PYTHONPATH: .

      # 5. Update lottery events（抽選情報更新）
      - name: Update lottery events
        run: python scripts/update_lottery_events.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 6. Update alerts（アラート生成）
      - name: Update alerts
        run: python scripts/update_alerts.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 7. Update overseas prices（海外市場価格更新）
      - name: Update overseas prices
        run: python scripts/update_overseas_prices.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 8. Import buyback CSV
      - name: Import buyback CSV
        run: python -m src.cli import-buyback-csv --file data/manual_buyback_prices.csv

      # 9. Import market CSV
      - name: Import market CSV
        run: python -m src.cli import-market-csv --file data/manual_market_prices.csv

      # 9.5. Import sale price CSV（手動登録の二次流通価格）
      - name: Import sale price CSV
        run: python -m src.cli import-sale-csv --file data/manual_sale_prices.csv
        continue-on-error: true

      # 9.6. Collect resale prices（二次流通市場 新品/未使用 自動取得）
      # eBay Finding API → HTML fallback / Amazon JP / メルカリ / ヤフオク / 楽天市場
      # Cloud IP ブロック時は graceful fallback（exit 0）
      - name: Collect resale prices
        run: python scripts/collect_resale_prices.py
        continue-on-error: true
        env:
          PYTHONPATH: .
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          # 公式API統合（キー設定時のみ自動有効化・未設定ならHTMLフォールバック）
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          YAHOO_SHOPPING_APP_ID: ${{ secrets.YAHOO_SHOPPING_APP_ID }}

      # 10. Run buyback premium check（統合ジョブ）
      - name: Run buyback premium check
        run: python -m src.cli run-buyback-premium-check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 11. Calculate sedori routes
      - name: Calculate sedori routes
        run: python -m src.cli calculate-sedori-routes
        continue-on-error: true

      # 11.5. Scan primary-to-secondary deals（一次→二次流通 利益案件スキャン）
      # run-buyback-premium-check(step10) の後に実行して海外価格ベースの利益案件を上書き保存
      - name: Scan primary-to-secondary deals
        run: python -m src.cli scan-primary-to-secondary
        continue-on-error: true

      # 11.4 Collect flea sold prices（規約遵守: 手動キュレーション + 検索URL方式）
      - name: Collect flea sold prices
        run: python scripts/collect_flea_sold_prices.py --sources yahoo,mercari,rakuma
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 11.5 Generate normalized price observations（ranking/sedori/LP 共通の価格定義）
      - name: Generate normalized price observations
        run: python scripts/generate_normalized_price_observations.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 11.6 Generate validated pro profit routes
      - name: Generate profit routes
        run: python scripts/generate_profit_routes.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 12. Generate ranking report
      - name: Generate ranking report
        run: python scripts/generate_ranking_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13. Generate sedori routes report
      - name: Generate sedori routes report
        run: python scripts/generate_sedori_routes_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.5 Generate Profit Health Dashboard（日次システム監視）
      - name: Generate health report
        run: python scripts/generate_health_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.6 Generate AI Opportunities（AI Dashboard の中核・ルールベース）
      - name: Generate AI opportunities
        run: python scripts/generate_ai_opportunities.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.7 Generate Notifications（条件成立を検知して通知イベント生成）
      - name: Generate notifications
        run: python scripts/generate_notifications.py
        continue-on-error: true
        env:
          PYTHONPATH: .
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 13.8 Generate Market Coverage（監視対象カバレッジ分析・拡充提案）
      - name: Generate coverage report
        run: python scripts/generate_coverage_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.9 Generate Capital Allocation（予算配分・意思決定層）
      - name: Generate allocation plan
        run: python scripts/generate_allocation_plan.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.10 Generate Execution Intelligence（予測 vs 実績の評価・学習）
      - name: Generate execution intelligence
        run: python scripts/generate_execution_intelligence.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.11 Generate Admin Dashboard（SaaS 運営集計）
      - name: Generate admin dashboard
        run: python scripts/generate_admin_dashboard.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      - name: Generate data quality report
        run: python scripts/generate_data_quality_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.12 Generate Data Quality Engine（取得・正規化・品質管理の可視化と改善計画）
      # ※ Production Report が本エンジンの honest スコアを参照するため先に実行する
      - name: Generate data quality dashboard
        run: python scripts/generate_data_quality_dashboard.py
        continue-on-error: true
        env:
          PYTHONPATH: .
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}

      # 13.13 Generate Production Readiness Report（本番監査・Data Quality次元は上のエンジンを参照）
      - name: Generate production report
        run: python scripts/generate_production_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 13.14 Generate Beta Launch Preparation（β体験ページ + Beta Report）
      - name: Generate beta report
        run: python scripts/generate_beta_report.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      # 14. Generate daily LP
      - name: Generate daily LP Variant A
        run: python -m src.cli generate-daily-lp --variant A

      # 15. Lottery quality gate
      - name: Lottery quality gate
        id: lottery_quality_gate
        continue-on-error: true   # 期限切れ検出時もLPは更新する（サマリーで通知）
        run: |
          python scripts/check_lottery_quality.py
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" -eq 1 ]; then
            # FAILURE: 期限切れ active / 重複 / 古い文言 → LP公開前に要確認
            echo "::error::抽選品質ゲート FAILURE — 受付終了済み active または古い文言を検出（抽選タブ表示ミスリスク）"
            exit 1
          fi
          # WARNING は check_lottery_quality.py が ::warning:: を直接出力するため、ここでは何もしない
        env:
          PYTHONPATH: .

      # 16. Build public LP
      - name: Build public LP
        run: python -m src.cli build-public-lp

      # 17. Deploy check
      - name: Deploy check
        run: python -m src.cli deploy-check-lp | tee exports/deploy_check_latest.txt

      # 18. Prelaunch check
      - name: Prelaunch check
        run: python -m src.cli prelaunch-check | tee exports/prelaunch_check_latest.txt
        continue-on-error: true

      # 18b. Upload Playwright camera debug artifacts (rendered HTML / screenshots)
      - name: Upload camera Playwright debug
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: camera-playwright-debug
          path: |
            exports/debug_camera/
            exports/debug_camera_screenshots/
            exports/camera_buyback_status.json
          retention-days: 7
          if-no-files-found: ignore

      # 19. Notify workflow result
      - name: Notify workflow result
        run: python scripts/notify_workflow_result.py
        continue-on-error: true
        env:
          PYTHONPATH: .
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 20. Commit and push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 他Runが先にpushしていた場合に備えてrebase（concurrencyで通常不要だが二重安全策）
          git pull --rebase origin main || true

          git add docs/ exports/lp/daily/ exports/collector_report/ exports/lottery_report/ \
                  exports/alerts_report/ exports/ranking_report/ exports/sedori_routes_report/ \
                  exports/overseas_prices/ \
                  exports/normalized_price_observations/ \
                  exports/profit_routes/ \
                  exports/flea_sold_prices/ \
                  exports/ai_opportunities/ \
                  exports/notifications/ \
                  exports/coverage/ \
                  exports/allocation/ \
                  exports/execution/ \
                  exports/admin/ \
                  exports/production/ \
                  data/accounts/ \
                  audit_health/ \
                  exports/data_quality_report/ exports/data_quality/ exports/beta/ docs/beta/ \
                  exports/camera_buyback_status.json \
                  data/alerts.csv data/lottery_events.csv \
                  data/overseas_price_history.csv \
                  exports/deploy_check_latest.txt exports/prelaunch_check_latest.txt \
                  exports/resale_collection_status.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily LP update $(TZ=Asia/Tokyo date +%Y-%m-%d_%H:%M) [auto update]"
            git push origin main
          fi
