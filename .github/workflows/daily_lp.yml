name: Daily LP Update

on:
  schedule:
    # 日本時間 12:00 JST (UTC: 03:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init DB
        run: python -m src.cli init-db

      - name: Update buyback prices auto scraping
        run: python scripts/update_buyback_prices.py
        continue-on-error: true
        env:
          PYTHONPATH: .

      - name: Collector quality gate
        id: quality_gate
        continue-on-error: true
        run: |
          python scripts/check_collector_quality.py
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "::error::品質ゲート FAILURE — suspicious_price / low_confidence など誤価格リスクあり"
            exit 1
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::品質ゲート WARNING — 取得率低下または連続失敗店舗あり"
          fi
        env:
          PYTHONPATH: .

      - name: Import buyback CSV
        run: python -m src.cli import-buyback-csv --file data/manual_buyback_prices.csv

      - name: Import market CSV
        run: python -m src.cli import-market-csv --file data/manual_market_prices.csv

      - name: Run buyback premium check
        run: python -m src.cli run-buyback-premium-check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Calculate sedori routes
        run: python -m src.cli calculate-sedori-routes
        continue-on-error: true

      - name: Generate daily LP Variant A
        run: python -m src.cli generate-daily-lp --variant A

      - name: Build public LP
        run: python -m src.cli build-public-lp

      - name: Deploy check
        run: python -m src.cli deploy-check-lp

      - name: Prelaunch check
        run: python -m src.cli prelaunch-check
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/ exports/lp/daily/ exports/collector_report/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily LP update $(TZ=Asia/Tokyo date +%Y-%m-%d_%H:%M) [auto update]"
            git push
          fi
