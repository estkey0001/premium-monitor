notifications:
  line:
    enabled: false
    token_env: "LINE_NOTIFY_TOKEN"
    send_ranks:
      - "S"
      - "A"

  discord:
    enabled: false
    webhook_url_env: "DISCORD_WEBHOOK_URL"
    send_ranks:
      - "S"
      - "A"

  telegram:
    enabled: false
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"
    send_ranks:
      - "S"

  log:
    enabled: true
    send_ranks:
      - "S"
      - "A"
      - "B"
      - "C"
